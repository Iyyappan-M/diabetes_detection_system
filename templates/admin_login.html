{% extends 'base.html' %}

{% block title %}Admin Login - Diabetes Detection{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg p-4 border-top border-primary border-4">
                <div class="card-body">
                    <h2 class="text-center fw-bold mb-4">Admin Portal</h2>
                    <p class="text-center text-muted mb-4">Restricted access for authorized personnel only.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label">Admin Username</label>
                            <input type="text" name="username" class="form-control p-3 bg-light" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control p-3 bg-light" required>
                        </div>
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-dark btn-lg">Access Dashboard</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
