services:
  - type: web
    name: diabetes-detection-system
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn diabetes_detection_system.wsgi"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: diabetes-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"

databases:
  - name: diabetes-db
    plan: free
